---
layout: default
---
<section class="intro">
  <h1 class="intro-hello">Welcome, friend</h1>
  <p>I’m Deepak and this is my digital home.</p>
</section>

<section class="recent">
  <h2 class="section-heading">Latest writing</h2>
  <ul class="post-list">
    {% for post in site.posts limit:5 %}
      <li>
        <a class="post-list__link" href="{{ post.url | relative_url }}">{{ post.title }}</a>
        <span class="post-list__date">{{ post.date | date: "%b %-d, %Y" }}</span>
      </li>
    {% endfor %}
  </ul>
  <p><a href="{{ '/blog/' | relative_url }}">See all posts →</a></p>
</section>
