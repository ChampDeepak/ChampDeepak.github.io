---
layout: default
title: Blog
permalink: /blog/
---
<h1 class="page-title">Blog</h1>
<ul class="post-list">
  {% for post in site.posts %}
    <li>
      <a class="post-list__link" href="{{ post.url | relative_url }}">{{ post.title }}</a>
      <span class="post-list__date">{{ post.date | date: "%b %-d, %Y" }}</span>
    </li>
  {% endfor %}
</ul>
