---
layout: default
---
<article class="post">
  <h1 class="post-title">{{ page.title }}</h1>
  <p class="post-meta">
    {% if page.author %}by {{ page.author }}{% endif %}
    {% if page.rating %} · {{ page.rating }}/5{% endif %}
  </p>
  <div class="content">
    {{ content }}
  </div>
  <hr>
  <p class="post-back"><a href="{{ '/books/' | relative_url }}">← All book summaries</a></p>
</article>
